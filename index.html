<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>3D World Map - Cesium</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html, body, #cesiumContainer {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
}
</style>
</head>

<body>

<div id="cesiumContainer"></div>

<script>

// ✅ YOUR TOKEN ADDED HERE
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIyNmRlMmViOS1jMDlkLTQ4ZGEtOTlhMS0zMDEzN2IxOTA5MzkiLCJpZCI6NDE1MjcxLCJpYXQiOjE3NzU2NDI3NDZ9.p0CEsbLvcDgHURo_mEl9zvp6Djg5Jul6nuVyceGBqS4";

// ✅ CREATE VIEWER
const viewer = new Cesium.Viewer('cesiumContainer', {
    animation: false,
    timeline: false,
    baseLayerPicker: true,
    geocoder: true,
    sceneModePicker: true
});

// ✅ REMOVE DEFAULT EMPTY LAYER
viewer.imageryLayers.removeAll();

// ✅ ADD REAL WORLD MAP
viewer.imageryLayers.addImageryProvider(
    new Cesium.IonImageryProvider({ assetId: 2 })
);

// ✅ ADD TERRAIN (FIXED METHOD)
viewer.terrainProvider = new Cesium.CesiumTerrainProvider({
    url: Cesium.IonResource.fromAssetId(1)
});

// ✅ STOP AUTO ROTATION
viewer.clock.shouldAnimate = false;

// ✅ DEFAULT VIEW (INDIA / SAUDI AREA)
viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(60, 22, 4000000)
});

// ✅ ADD SAMPLE POINTS
viewer.entities.add({
    name: "Hyderabad",
    position: Cesium.Cartesian3.fromDegrees(78.48, 17.38),
    point: { pixelSize: 10, color: Cesium.Color.RED },
    label: {
        text: "Hyderabad",
        verticalOrigin: Cesium.VerticalOrigin.TOP
    }
});

viewer.entities.add({
    name: "Dammam",
    position: Cesium.Cartesian3.fromDegrees(50.09, 26.42),
    point: { pixelSize: 10, color: Cesium.Color.YELLOW },
    label: {
        text: "Dammam",
        verticalOrigin: Cesium.VerticalOrigin.TOP
    }
});

// ✅ OPTIONAL: 3D BUILDINGS (UNCOMMENT IF NEEDED)

})();
*/

</script>

</body>
</html>
