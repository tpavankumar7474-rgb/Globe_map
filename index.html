<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fast 3D World Map</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html, body, #cesiumContainer {
  width:100%;
  height:100%;
  margin:0;
  overflow:hidden;
}
</style>
</head>

<body>
<div id="cesiumContainer"></div>

<script>
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJjOWYyYjE5OS0yYTJhLTQzYjItOTM5ZS0xZDdiYjcxMDFiMTEiLCJpZCI6NDI0MDA2LCJpYXQiOjE3NzcyNjE2MTd9.NIO38ZbBzqKseoYD00j-Z1uCk6-QhqAa9HevYfTU4k8";

const viewer = new Cesium.Viewer("cesiumContainer", {
  animation: false,
  timeline: false,
  baseLayerPicker: false,
  geocoder: true,
  sceneModePicker: true,
  navigationHelpButton: false,
  infoBox: true,
  selectionIndicator: true,
  requestRenderMode: true,
  maximumRenderTimeChange: Infinity
});

// SPEED SETTINGS
viewer.resolutionScale = 0.75;
viewer.scene.globe.maximumScreenSpaceError = 4;
viewer.scene.fog.enabled = true;
viewer.scene.globe.enableLighting = false;
viewer.scene.highDynamicRange = false;
viewer.scene.shadowMap.enabled = false;
viewer.clock.shouldAnimate = false;

// CLEAR DEFAULT LAYERS
viewer.imageryLayers.removeAll();

// WORLD IMAGERY
(async function () {
  const imagery = await Cesium.IonImageryProvider.fromAssetId(2);
  viewer.imageryLayers.addImageryProvider(imagery);
})();

// TERRAIN
(async function () {
  viewer.terrainProvider = await Cesium.CesiumTerrainProvider.fromIonAssetId(1);
})();

// 3D OSM BUILDINGS
let buildings;
(async function () {
  try {
    buildings = await Cesium.createOsmBuildingsAsync();
    buildings.maximumScreenSpaceError = 8;
    buildings.dynamicScreenSpaceError = true;
    buildings.dynamicScreenSpaceErrorFactor = 4;
    buildings.maximumMemoryUsage = 256;
    viewer.scene.primitives.add(buildings);
  } catch (err) {
    console.error("Buildings failed:", err);
  }
})();

// OSM ROAD / STREET OVERLAY
const osmRoads = new Cesium.OpenStreetMapImageryProvider({
  url: "https://a.tile.openstreetmap.org/"
});

const roadLayer = viewer.imageryLayers.addImageryProvider(osmRoads);
roadLayer.alpha = 0.45;

// HYDERABAD POINT
viewer.entities.add({
  name: "Hyderabad",
  position: Cesium.Cartesian3.fromDegrees(78.48, 17.38, 100),
  point: {
    pixelSize: 12,
    color: Cesium.Color.RED,
    outlineColor: Cesium.Color.WHITE,
    outlineWidth: 2,
    heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
  },
  label: {
    text: "Hyderabad",
    font: "16px Arial",
    fillColor: Cesium.Color.WHITE,
    outlineColor: Cesium.Color.BLACK,
    outlineWidth: 3,
    style: Cesium.LabelStyle.FILL_AND_OUTLINE,
    pixelOffset: new Cesium.Cartesian2(0, -25),
    heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
  }
});

// DAMMAM POINT
viewer.entities.add({
  name: "Dammam",
  position: Cesium.Cartesian3.fromDegrees(50.09, 26.42, 100),
  point: {
    pixelSize: 12,
    color: Cesium.Color.YELLOW,
    outlineColor: Cesium.Color.BLACK,
    outlineWidth: 2,
    heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
  },
  label: {
    text: "Dammam",
    font: "16px Arial",
    fillColor: Cesium.Color.YELLOW,
    outlineColor: Cesium.Color.BLACK,
    outlineWidth: 3,
    style: Cesium.LabelStyle.FILL_AND_OUTLINE,
    pixelOffset: new Cesium.Cartesian2(0, -25),
    heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
  }
});

// START CLOSE TO DAMMAM STREET LEVEL
viewer.camera.flyTo({
  destination: Cesium.Cartesian3.fromDegrees(50.09, 26.42, 1800),
  orientation: {
    heading: Cesium.Math.toRadians(0),
    pitch: Cesium.Math.toRadians(-45),
    roll: 0
  },
  duration: 2
});
</script>
</body>
</html>
