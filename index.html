<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sharp 3D World Map</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html, body, #cesiumContainer {
  width:100%;
  height:100%;
  margin:0;
  overflow:hidden;
}
</style>
</head>

<body>
<div id="cesiumContainer"></div>

<script>
Cesium.Ion.defaultAccessToken = "YOUR_TOKEN_HERE";

const viewer = new Cesium.Viewer("cesiumContainer", {
  animation: false,
  timeline: false,
  baseLayerPicker: true,
  geocoder: true,
  sceneModePicker: true,
  navigationHelpButton: false,
  infoBox: true,
  selectionIndicator: true,
  requestRenderMode: false
});

// SHARP MAP SETTINGS
viewer.resolutionScale = 1.0;
viewer.scene.globe.maximumScreenSpaceError = 1.5;
viewer.scene.fog.enabled = false;
viewer.scene.globe.enableLighting = false;
viewer.scene.highDynamicRange = false;
viewer.scene.globe.depthTestAgainstTerrain = false;

// CLEAR DEFAULT
viewer.imageryLayers.removeAll();

// SATELLITE IMAGERY
(async function () {
  const imagery = await Cesium.IonImageryProvider.fromAssetId(2);
  viewer.imageryLayers.addImageryProvider(imagery);
})();

// TERRAIN
(async function () {
  viewer.terrainProvider = await Cesium.CesiumTerrainProvider.fromIonAssetId(1);
})();

// 3D BUILDINGS
(async function () {
  try {
    const buildings = await Cesium.createOsmBuildingsAsync();
    buildings.maximumScreenSpaceError = 4;
    viewer.scene.primitives.add(buildings);
  } catch (err) {
    console.error("Buildings failed:", err);
  }
})();

// CITY LABEL FUNCTION
function addCity(name, lon, lat, color) {
  viewer.entities.add({
    name: name,
    position: Cesium.Cartesian3.fromDegrees(lon, lat, 700),
    point: {
      pixelSize: 14,
      color: color,
      outlineColor: Cesium.Color.WHITE,
      outlineWidth: 3,
      disableDepthTestDistance: Number.POSITIVE_INFINITY
    },
    label: {
      text: name,
      font: "bold 22px Arial",
      fillColor: color,
      outlineColor: Cesium.Color.BLACK,
      outlineWidth: 5,
      style: Cesium.LabelStyle.FILL_AND_OUTLINE,
      pixelOffset: new Cesium.Cartesian2(0, -35),
      verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
      disableDepthTestDistance: Number.POSITIVE_INFINITY,
      scaleByDistance: new Cesium.NearFarScalar(1000, 1.2, 10000000, 0.6)
    }
  });
}

addCity("Hyderabad", 78.48, 17.38, Cesium.Color.RED);
addCity("Dammam", 50.09, 26.42, Cesium.Color.YELLOW);
addCity("Khobar", 50.20, 26.27, Cesium.Color.CYAN);
addCity("Dhahran", 50.08, 26.23, Cesium.Color.LIME);

// START CLOSE TO DAMMAM
viewer.camera.flyTo({
  destination: Cesium.Cartesian3.fromDegrees(50.09, 26.42, 2200),
  orientation: {
    heading: Cesium.Math.toRadians(0),
    pitch: Cesium.Math.toRadians(-45),
    roll: 0
  },
  duration: 2
});
</script>
</body>
</html>
